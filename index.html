<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AsiaX DAO Portal</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/web3/4.1.1/web3.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; padding: 20px; text-align: center; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 15px; margin: 10px auto; max-width: 400px; border: 1px solid #333; }
        button { background: #f3ba2f; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
        input { width: 90%; padding: 10px; margin: 10px 0; border-radius: 5px; border: 1px solid #444; background: #000; color: white; }
        .status { color: #00ff00; font-size: 0.8rem; }
    </style>
</head>
<body>

    <h1>AsiaX DAO</h1>
    <div id="walletAddress" class="status">Wallet Not Connected</div>
    <button onclick="connectWallet()">Connect SafePal / Trust / MetaMask</button>

    <div class="card">
        <h3>Staking (Contract 1)</h3>
        <p>Your Stake: <span id="userStake">0</span> AsiaX</p>
        <input type="number" id="stakeAmount" placeholder="Amount to Stake">
        <button onclick="stakeTokens()">Stake Tokens</button>
        <button onclick="claimRewards()" style="background: #28a745;">Claim Rewards</button>
        <button onclick="withdrawTokens()" style="background: #dc3545;">Withdraw (After Lock)</button>
    </div>

    <div class="card">
        <h3>Governance (Contract 2)</h3>
        <input type="text" id="propTitle" placeholder="Proposal Title">
        <button onclick="createProposal()">Create Proposal</button>
        <hr>
        <input type="number" id="propId" placeholder="Proposal ID">
        <div style="display: flex; gap: 10px;">
            <button onclick="vote(true)">Vote YES</button>
            <button onclick="vote(false)" style="background: #dc3545;">Vote NO</button>
        </div>
    </div>

    <script>
        let web3;
        let account;
        const stakingAddr = "0x831759FCA93d9bCD7119a997f951Cc62eD2CAa2c";
        const govAddr = "0xeeA40E06c83649f8B0c10c40391bF38FaD7d805b";
        const tokenAddr = "0x80675dCe080d52dD842e93bF3bc15E28dACD78CB";

        const govABI = [[{"inputs":[{"internalType":"address","name":"_stakingAddress","type":"address"}],"stateMutability":"nonpayable","type":"constructor"},{"anonymous":false,"inputs":[{"indexed":false,"internalType":"uint256","name":"id","type":"uint256"},{"indexed":false,"internalType":"string","name":"title","type":"string"},{"indexed":false,"internalType":"address","name":"proposer","type":"address"}],"name":"ProposalCreated","type":"event"},{"inputs":[],"name":"VOTING_PERIOD","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"},{"inputs":[{"internalType":"uint256","name":"_proposalId","type":"uint256"},{"internalType":"bool","name":"_support","type":"bool"}],"name":"castVote","outputs":[],"stateMutability":"nonpayable","type":"function"},{"inputs":[{"internalType":"string","name":"_title","type":"string"}],"name":"createProposal","outputs":[],"stateMutability":"nonpayable","type":"function"},{"inputs":[{"internalType":"uint256","name":"","type":"uint256"},{"internalType":"address","name":"","type":"address"}],"name":"hasVoted","outputs":[{"internalType":"bool","name":"","type":"bool"}],"stateMutability":"view","type":"function"},{"inputs":[],"name":"proposalCount","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"},{"inputs":[{"internalType":"uint256","name":"","type":"uint256"}],"name":"proposals","outputs":[{"internalType":"address","name":"proposer","type":"address"},{"internalType":"string","name":"title","type":"string"},{"internalType":"uint256","name":"endTime","type":"uint256"},{"internalType":"uint256","name":"votesFor","type":"uint256"},{"internalType":"uint256","name":"votesAgainst","type":"uint256"},{"internalType":"bool","name":"executed","type":"bool"}],"stateMutability":"view","type":"function"},{"inputs":[],"name":"stakingContract","outputs":[{"internalType":"contract IStaking","name":"","type":"address"}],"stateMutability":"view         const tokenABI = [[{"inputs":[],"stateMutability":"nonpayable","type":"constructor"},{"anonymous":false,"inputs":[{"indexed":true,"internalType":"address","name":"owner","type":"address"},{"indexed":true,"internalType":"address","name":"spender","type":"address"},{"indexed":false,"internalType":"uint256","name":"value","type":"uint256"}],"name":"Approval","type":"event"},{"anonymous":false,"inputs":[{"indexed":true,"internalType":"address","name":"from","type":"address"},{"indexed":true,"internalType":"address","name":"to","type":"address"},{"indexed":false,"internalType":"uint256","name":"value","type":"uint256"}],"name":"Transfer","type":"event"},{"inputs":[{"internalType":"address","name":"","type":"address"},{"internalType":"address","name":"","type":"address"}],"name":"allowance","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"},{"inputs":[{"internalType":"address","name":"_spender","type":"address"},{"internalType":"uint256","name":"_value","type":"uint256"}],"name":"approve","outputs":[{"internalType":"bool","name":"","type":"bool"}],"stateMutability":"nonpayable","type":"function"},{"inputs":[{"internalType":"address","name":"","type":"address"}],"name":"balanceOf","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"},{"inputs":[],"name":"decimals","outputs":[{"internalType":"uint8","name":"","type":"uint8"}],"stateMutability":"view","type":"function"},{"inputs":[{"internalType":"address","name":"_spender","type":"address"},{"internalType":"uint256","name":"_subtractedValue","type":"uint256"}],"name":"decreaseAllowance","outputs":[{"internalType":"bool","name":"","type":"bool"}],"stateMutability":"nonpayable","type":"function"},{"inputs":[{"internalType":"address","name":"_spender","type":"address"},{"internalType":"uint256","name":"_addedValue","type":"uint256"}],"name":"increaseAllowance","outputs":[{"internalType":"bool","name":"","t         async function connectWallet() {
            if (window.ethereum) {
                // SafePal aur MetaMask dono window.ethereum use karte hain
                web3 = new Web3(window.ethereum);
                try {
                    const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                    account = accounts[0];
                    document.getElementById('walletAddress').innerText = "Connected: " + account;
                    updateUI();
                } catch (err) {
                    alert("User denied connection");
                }
            } else {
                alert("Please open this in SafePal DApp Browser");
            }
        }

        async function stakeTokens() {
            const amount = web3.utils.toWei(document.getElementById('stakeAmount').value, 'ether');
            const tokenContract = new web3.eth.Contract(tokenABI, tokenAddr);
            const stakingContract = new web3.eth.Contract(stakingABI, stakingAddr);

            // 1. Approve (Zaroori Step)
            await tokenContract.methods.approve(stakingAddr, amount).send({ from: account });
            // 2. Stake
            await stakingContract.methods.stake(amount).send({ from: account });
            updateUI();
        }

        async function updateUI() {
            const stakingContract = new web3.eth.Contract(stakingABI, stakingAddr);
            const staked = await stakingContract.methods.getStakedAmount(account).call();
            document.getElementById('userStake').innerText = web3.utils.fromWei(staked, 'ether');
        }

        // Baki functions (withdraw, claim, vote) bhi isi tarah add honge...
    </script>
</body>
</html>
