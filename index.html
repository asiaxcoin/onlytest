<!doctype html>
<html lang="hi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>𝐀𝐒𝐈𝐀𝐗 𝐏𝐑𝐎</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.11.1/ethers.umd.min.js"></script>

  <style>
    :root {
      --bg: #0a0e1a;
      --card: rgba(20, 30, 50, 0.8);
      --glass: rgba(255,255,255,0.05);
      --accent: #00d4ff;
      --success: #00ff88;
      --warning: #ffaa00;
      --error: #ff4757;
      --muted: #a0b0c0;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { height:100%; font-family:'Inter',system-ui,sans-serif; }
    body {
      background: linear-gradient(135deg, #0a0e1a 0%, #1a1f2e 50%, #0a0e1a 100%);
      color: #e8f0ff;
      padding-bottom: 20px;
      overflow-x: hidden;
    }
    .app { max-width: 420px; margin: 0 auto; padding: 16px; }
    .topbar { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; margin-bottom: 16px; backdrop-filter: blur(20px); background: rgba(10,14,26,0.8); border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); }
    .brand { display: flex; align-items: center; gap: 12px; }
    .custom-logo { width: 120px; height: 48px; object-fit: contain; background: transparent; }
    .status { padding: 12px; border-radius: 12px; text-align: center; font-size: 0.85rem; font-weight: 500; background: var(--glass); border: 1px solid rgba(255,255,255,0.1); margin-bottom: 16px; }
    .status.success { background: rgba(0,255,136,0.1); color: var(--success); border-color: var(--success); }
    .status.error { background: rgba(255,71,87,0.1); color: var(--error); border-color: var(--error); }
    .card-app { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 20px; margin-bottom: 16px; backdrop-filter: blur(20px); box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
    .stats-row { display: flex; gap: 12px; flex-wrap: wrap; }
    .stat { flex: 1; padding: 16px; border-radius: 16px; background: rgba(255,255,255,0.02); display: flex; flex-direction: column; gap: 8px; min-width: 120px; border: 1px solid rgba(255,255,255,0.05); }
    .stat-label { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; }
    .stat-value { font-size: 1.1rem; font-weight: 700; display: flex; align-items: center; gap: 6px; }
    .btn-modern { border-radius: 16px; padding: 14px 20px; font-weight: 600; border: none; transition: all 0.3s; min-height: 48px; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .btn-primary { background: linear-gradient(135deg, var(--accent), #00ff88); color: #000; }
    .btn-success { background: linear-gradient(135deg, var(--success), #00cc66); color: #000; }
    .btn-warning { background: linear-gradient(135deg, var(--warning), #ff8800); color: #000; }
    .btn-outline { background: transparent; border: 1px solid var(--accent); color: var(--accent); }
    .form-control { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: #fff; height: 48px; }
    .timer-card { background: linear-gradient(135deg, rgba(192,192,192,0.1), rgba(169,169,0.1)); border: 1px solid #C0C0C0; animation: pulse-timer 2s infinite; }
    @keyframes pulse-timer { 0%,100%{box-shadow:0 0 0 0 rgba(192,192,192,0.4)} 50%{box-shadow:0 0 0 12px rgba(192,192,192,0)} }
    .bottom-nav { position: fixed; left: 50%; transform: translateX(-50%); bottom: 16px; width: calc(100% - 32px); display: flex; gap: 12px; background: rgba(10,14,26,0.9); padding: 12px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(20px); z-index: 100; }
    .nav-btn { flex: 1; padding: 14px; border-radius: 16px; background: transparent; border: none; color: var(--muted); text-align: center; }
    .nav-btn.active { background: var(--accent); color: #000; }
    .pulse { animation: pulse 2s infinite; }
    @keyframes pulse { 0%{transform:scale(1)} 50%{transform:scale(1.05)} 100%{transform:scale(1)} }
  </style>

  <script type="module">
    import { createWeb3Modal, defaultConfig } from 'https://esm.run/@web3modal/ethers@latest'
    const projectId = '813cf5c3987af12efdc809472c55eb8a'; 
    const polygon = {
      chainId: 137,
      name: 'Polygon',
      currency: 'POL',
      explorerUrl: 'https://polygonscan.com',
      rpcUrl: 'https://polygon-rpc.com'
    }
    const metadata = { name: 'AsiaX Pro', description: 'Wealth Creation', url: window.location.origin, icons: ['prologo.png'] }
    const modal = createWeb3Modal({ ethersConfig: defaultConfig({ metadata }), chains: [polygon], projectId, themeMode: 'dark' })
    
    window.connectWallet = () => modal.open();
    modal.subscribeProvider(async (state) => {
      if (state.isConnected && state.provider) { setupV6(state.provider); }
    });
  </script>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="brand">
        <img src="prologo.png" class="custom-logo" alt="ASIAX PRO" />
      </div>
      <button id="connectBtn" onclick="connectWallet()" class="btn btn-modern btn-primary pulse">
        <i class="fas fa-wallet"></i> <span id="connectLabel">Connect</span>
      </button>
    </div>

    <div id="status" class="status">Ready — Connect Wallet</div>

    <div class="card-app">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
          <div class="small-text">Welcome</div>
          <div id="userAddress" style="font-weight:700;font-size:0.9rem">Not Connected</div>
        </div>
        <div class="text-end">
          <div id="totalTeam" class="small-text mb-1">Team: 0</div>
          <button id="shareBtn" class="btn btn-sm btn-outline"><i class="fas fa-share-alt"></i></button>
        </div>
      </div>
      
      <div class="stats-row">
        <div class="stat">
          <div class="stat-label">Total Invest</div>
          <div class="stat-value"><i class="fas fa-coins"></i> <span id="totalInvest">0</span> AX</div>
        </div>
        <div class="stat">
          <div class="stat-label">Wallet Bal</div>
          <div class="stat-value"><i class="fas fa-wallet"></i> <span id="walletBal">0</span> AX</div>
        </div>
      </div>
      
      <div class="stats-row mt-2">
        <div class="stat">
          <div class="stat-label">Total Income</div>
          <div class="stat-value"><i class="fas fa-money-bill-wave"></i> <span id="totalWithdrawn">0</span> AX</div>
        </div>
        <div class="stat">
          <div class="stat-label">Pending ROI</div>
          <div class="stat-value"><i class="fas fa-chart-line"></i> <span id="pendingROI">0</span> AX</div>
        </div>
      </div>
    </div>

    <div class="card-app">
      <div class="small-text mb-2">Income Breakdown</div>
      <div class="stats-row">
        <div class="stat">
          <div class="stat-label">Sponsor</div>
          <div class="stat-value"><span id="sponsorInc">0</span></div>
        </div>
        <div class="stat">
          <div class="stat-label">Generation</div>
          <div class="stat-value"><span id="genInc">0</span></div>
        </div>
        <div class="stat">
          <div class="stat-label">Pools</div>
          <div class="stat-value"><span id="poolRewards">0</span></div>
        </div>
      </div>
      <div class="d-flex gap-2 mt-3">
        <button onclick="withdraw()" class="btn btn-modern btn-success flex-fill">Claim Income</button>
        <button onclick="loadData()" class="btn btn-modern btn-outline flex-fill"><i class="fas fa-sync"></i></button>
      </div>
    </div>

    <div id="timerCard" class="card-app timer-card" style="display:none;">
      <div class="d-flex justify-content-between align-items-center">
        <div>
          <div class="small-text">Silver Pool Entry</div>
          <div id="timerDisplay" style="font-size:1.3rem;font-weight:700">30:00:00</div>
        </div>
        <i class="fas fa-medal" style="font-size:2rem;color:var(--warning)"></i>
      </div>
    </div>

    <div class="card-app">
      <div class="small-text mb-2">Investment</div>
      <input id="referrerInput" class="form-control mb-3" placeholder="Referrer Address" />
      <div class="input-group mb-3">
        <input id="investAmount" type="number" class="form-control" placeholder="Amount (AX)" />
        <button onclick="setMax()" class="btn btn-outline">MAX</button>
      </div>
      <button id="investBtn" onclick="invest()" class="btn btn-modern btn-primary w-100">
        <i class="fas fa-rocket"></i> Invest Now
      </button>
    </div>

    <div class="card-app">
      <div class="d-flex gap-2">
        <button onclick="withdraw()" class="btn btn-modern btn-success flex-fill">Withdraw</button>
        <button onclick="claimPools()" class="btn btn-modern btn-warning flex-fill">Claim Pools</button>
      </div>
    </div>

    <div class="card-app mb-5">
      <div class="small-text mb-2">Fast Withdraw (10-1000 AX)</div>
      <div class="input-group">
        <input id="withdrawAmt" type="number" class="form-control" placeholder="Amount" />
        <button onclick="walletWithdraw()" class="btn btn-success">GO</button>
      </div>
    </div>

    <div class="bottom-nav">
      <button class="nav-btn active"><i class="fas fa-home"></i></button>
      <button class="nav-btn" onclick="location.href='axmenu.html'"><i class="fas fa-bars"></i></button>
      <button class="nav-btn" onclick="location.href='axbuy.html'"><i class="fas fa-coins"></i></button>
      <button class="nav-btn" onclick="location.href='axDirect.html'"><i class="fas fa-users"></i></button>
    </div>
  </div>

<script>
    const CONTRACT_ADDRESS = "0xF6d0d72AAf0Bbf5C459E680f1e6E75E3B1ce1f06";
    const TOKEN_ADDRESS = "0xe36b5223d488322fac2ddda937e5ab226e83fbbd";
    
    const ABI = [
        "function invest(address _referrer,uint256 _amount) external",
        "function withdraw() external",
        "function claimPoolRewards() external",
        "function WalletWithdraw(uint256 _amount) external",
        "function getUserIncome(address) view returns(uint256,uint256,uint256,uint256,uint256)",
        "function getUserNetwork(address) view returns(uint256,uint256,bool,bool,bool)",
        "function userBasic(address) view returns(address,uint256,uint256,uint256,uint256,uint256,uint256,uint256,uint256,uint256,uint256)",
        "function userWallet(address) view returns(uint256,uint256,uint256)",
        "function calculatePendingROI(address) view returns(uint256)"
    ];
    
    const TOKEN_ABI = [
        "function balanceOf(address) view returns(uint256)",
        "function approve(address,uint256) external returns(bool)",
        "function allowance(address,address) view returns(uint256)"
    ];

    let provider, signer, contract, tokenContract, userAddr;

    async function setupV6(walletProvider) {
        try {
            provider = new ethers.BrowserProvider(walletProvider);
            signer = await provider.getSigner();
            userAddr = await signer.getAddress();
            
            contract = new ethers.Contract(CONTRACT_ADDRESS, ABI, signer);
            tokenContract = new ethers.Contract(TOKEN_ADDRESS, TOKEN_ABI, signer);
            
            document.getElementById('userAddress').textContent = userAddr.slice(0,6)+'...'+userAddr.slice(-4);
            document.getElementById('connectLabel').textContent = 'Connected';
            document.getElementById('connectBtn').classList.remove('pulse');
            
            setStatus('✅ Connected!', 'success');
            loadData();
        } catch (e) { setStatus('Error: '+e.message, 'error'); }
    }

    async function loadData() {
        if(!signer) return;
        try {
            const [income, network, basic, wallet, pendingROI] = await Promise.all([
                contract.getUserIncome(userAddr),
                contract.getUserNetwork(userAddr),
                contract.userBasic(userAddr),
                contract.userWallet(userAddr),
                contract.calculatePendingROI(userAddr)
            ]);

            const fmt = (v) => parseFloat(ethers.formatUnits(v, 18)).toFixed(2);

            document.getElementById('totalInvest').textContent = fmt(basic[1]);
            document.getElementById('walletBal').textContent = fmt(wallet[0]);
            document.getElementById('totalWithdrawn').textContent = fmt(basic[4]);
            document.getElementById('pendingROI').textContent = fmt(pendingROI);
            document.getElementById('sponsorInc').textContent = fmt(income[1]);
            document.getElementById('genInc').textContent = fmt(income[2]);
            document.getElementById('poolRewards').textContent = fmt(income[3]);
            document.getElementById('totalTeam').textContent = `Team: ${network[1]}`;

            // Timer Logic
            if (Number(basic[2]) > 0 && !network[2]) {
                const deadline = Number(basic[2]) + (30 * 86400);
                startTimer(deadline);
            }
        } catch (e) { console.error(e); }
    }

    function startTimer(deadline) {
        const card = document.getElementById('timerCard');
        card.style.display = 'block';
        const timer = setInterval(() => {
            const now = Math.floor(Date.now() / 1000);
            const diff = deadline - now;
            if(diff <= 0) { clearInterval(timer); card.style.display='none'; return; }
            const d = Math.floor(diff/86400);
            const h = Math.floor((diff%86400)/3600);
            const m = Math.floor((diff%3600)/60);
            const s = diff%60;
            document.getElementById('timerDisplay').textContent = `${d}d ${h}h ${m}m ${s}s`;
        }, 1000);
    }

    async function invest() {
        const amt = document.getElementById('investAmount').value;
        let ref = document.getElementById('referrerInput').value || "0x0000000000000000000000000000000000000000";
        if(!amt || amt < 10) return alert("Min 10 AX");
        
        try {
            setStatus('🚀 Processing...', '');
            const amountWei = ethers.parseUnits(amt.toString(), 18);
            
            // Approval check
            const allowance = await tokenContract.allowance(userAddr, CONTRACT_ADDRESS);
            if(allowance < amountWei) {
                setStatus('🔓 Approving...', '');
                const txA = await tokenContract.approve(CONTRACT_ADDRESS, amountWei);
                await txA.wait();
            }
            
            setStatus('🚀 Investing...', '');
            const txI = await contract.invest(ref, amountWei);
            await txI.wait();
            setStatus('✅ Success!', 'success');
            loadData();
        } catch (e) { setStatus('Error: '+e.message, 'error'); }
    }

    async function withdraw() {
        try {
            setStatus('💸 Withdrawing...', '');
            const tx = await contract.withdraw();
            await tx.wait();
            loadData();
            setStatus('✅ Withdrawn!', 'success');
        } catch (e) { setStatus('Error: '+e.message, 'error'); }
    }

    async function claimPools() {
        try {
            const tx = await contract.claimPoolRewards();
            await tx.wait();
            loadData();
        } catch (e) { alert(e.message); }
    }

    async function walletWithdraw() {
        const amt = document.getElementById('withdrawAmt').value;
        if(!amt) return;
        try {
            const tx = await contract.WalletWithdraw(ethers.parseUnits(amt, 18));
            await tx.wait();
            loadData();
        } catch (e) { alert(e.message); }
    }

    async function setMax() {
        const bal = await tokenContract.balanceOf(userAddr);
        document.getElementById('investAmount').value = ethers.formatUnits(bal, 18);
    }

    function setStatus(txt, cls) {
        const s = document.getElementById('status');
        s.textContent = txt;
        s.className = `status ${cls}`;
    }

    // Referral link share
    document.getElementById('shareBtn').onclick = () => {
        if(!userAddr) return alert("Connect Wallet");
        const link = window.location.origin + window.location.pathname + "?ref=" + userAddr;
        navigator.clipboard.writeText(link);
        alert("Referral link copied!");
    };
</script>
</body>
</html>
