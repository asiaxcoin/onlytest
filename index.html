<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>AsiaX Pro • Master DAO</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { background: linear-gradient(135deg, #0f001a 0%, #05000f 100%); color: #e0e0ff; font-family: 'Inter', sans-serif; min-height: 100vh; margin: 0; }
        .glass { background: rgba(30, 20, 60, 0.4); backdrop-filter: blur(12px); border: 1px solid rgba(100, 100, 255, 0.15); border-radius: 1.25rem; }
        .connect-btn { background: linear-gradient(90deg, #00d4ff, #7b00ff); box-shadow: 0 4px 15px rgba(0, 212, 255, 0.3); transition: all 0.3s ease; }
        .vote-box { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 1rem; color: white; cursor: pointer; }
        .action-input { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); color: white; outline: none; }
        .withdraw-btn { background: linear-gradient(90deg, #ff4b2b, #ff416c); }
        .withdraw-btn:disabled { opacity: 0.3; filter: grayscale(1); cursor: not-allowed; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="antialiased p-4">

<div class="max-w-xl mx-auto space-y-6">
    <div class="flex justify-between items-center px-1 pt-4">
        <div class="text-xl font-bold tracking-tight bg-gradient-to-r from-cyan-400 to-purple-500 bg-clip-text text-transparent">ASIAX 1DAO</div>
        <button id="connectBtn" class="connect-btn text-white text-xs font-bold px-5 py-2.5 rounded-full flex items-center gap-2" onclick="connectWallet()">
            <i class="fa-solid fa-wallet"></i> <span id="walletText">Connect Wallet</span>
        </button>
    </div>

    <div class="grid grid-cols-3 gap-2">
        <div class="glass p-3 text-center border-b-2 border-cyan-500/50">
            <div class="text-[9px] text-gray-400 uppercase">Power</div>
            <div class="text-sm font-bold" id="votingPowerDisplay">0%</div>
        </div>
        <div class="glass p-3 text-center border-b-2 border-purple-500/50">
            <div class="text-[9px] text-gray-400 uppercase">Staked</div>
            <div class="text-sm font-bold" id="userStakedDisplay">0</div>
        </div>
        <div class="glass p-3 text-center border-b-2 border-cyan-500/50">
            <div class="text-[9px] text-gray-400 uppercase">Badge</div>
            <div class="text-[10px] font-bold text-cyan-400" id="badgeDisplay">VISITOR</div>
        </div>
    </div>

    <div class="glass p-5">
        <h2 class="text-xs font-bold text-cyan-400 uppercase mb-4">Governance Vote</h2>
        <div class="text-center">
            <h3 id="displayPropTitle" class="text-md font-bold mb-1">No Active Proposal</h3>
            <div class="grid grid-cols-2 gap-3 mt-4">
                <button onclick="castVote(true)" class="vote-box py-3 text-sm font-bold">YES <span id="resA" class="block text-[9px] text-gray-500">0%</span></button>
                <button onclick="castVote(false)" class="vote-box py-3 text-sm font-bold">NO <span id="resB" class="block text-[9px] text-gray-500">0%</span></button>
            </div>
        </div>
    </div>

    <div class="glass p-5">
        <div class="flex justify-between items-center mb-4">
            <span class="font-bold text-cyan-400 text-xs">My Rewards</span>
            <button onclick="claimAllRewards()" class="bg-cyan-500 text-black text-[9px] font-bold px-3 py-1 rounded">CLAIM ALL</button>
        </div>
        <div id="multiCoinList" class="space-y-2 text-xs italic text-gray-500 text-center">Wallet not connected</div>
    </div>

    <div class="glass p-5 border border-purple-500/20">
        <div class="flex justify-between mb-4">
            <h2 class="text-md font-bold text-white">Stake AsiaX</h2>
            <div class="text-[10px] text-cyan-300">Balance: <span id="userBalance">0.00</span></div>
        </div>
        <div class="relative mb-4">
            <input type="number" id="stakeAmount" placeholder="0.0" class="action-input w-full p-3 rounded-xl text-sm" />
            <button onclick="setMax()" class="absolute right-3 top-1/2 -translate-y-1/2 text-[10px] text-cyan-300 font-bold">MAX</button>
        </div>
        <button id="stakeBtn" onclick="handleStake()" class="connect-btn w-full text-white font-bold py-3.5 rounded-xl text-sm">STAKE NOW</button>
    </div>

    <div class="glass p-5 border border-red-500/20">
        <div class="flex justify-around items-center mb-5">
            <div class="text-center"><div id="days" class="text-xl font-bold">00</div><div class="text-[9px] uppercase">Days</div></div>
            <div class="text-center"><div id="hours" class="text-xl font-bold">00</div><div class="text-[9px] uppercase">Hrs</div></div>
            <div class="text-center"><div id="mins" class="text-xl font-bold">00</div><div class="text-[9px] uppercase">Mins</div></div>
        </div>
        <button id="withdrawBtn" disabled onclick="withdrawPrincipal()" class="withdraw-btn w-full text-white font-bold py-3.5 rounded-xl text-xs">WITHDRAW PRINCIPAL</button>
    </div>
</div>

<script>
    // --- CONFIG (POLYGON MAINNET) ---
    const STAKING_ADDR = "0x23E12941383c7de11D8ab066Ba96897535DD3e48";
    const GOV_ADDR = "0x074fF1363A23EE4142963bD34e4f88F7552C2ea1";
    const TOKEN_ADDR = "0x80675dCe080d52dD842e93bF3bc15E28dACD78CB";
    const CHAIN_ID = "0x89"; // Polygon 137

    const ABIs = {
        staking: ["function totalStaked() view returns (uint256)", "function members(address) view returns (uint256 stakedAmount, uint256 lockTimestamp)", "function LOCK_PERIOD() view returns (uint256)", "function getActiveRewardTokens() view returns (address[])", "function earned(address, address) view returns (uint256)", "function addCoinsToDAO(uint256)", "function claimAllRewards()", "function withdrawPrincipal()"],
        gov: ["function proposalCount() view returns (uint256)", "function proposals(uint256) view returns (address, string, uint256, uint256, uint256, bool)", "function castVote(uint256, bool)"],
        token: ["function balanceOf(address) view returns (uint256)", "function approve(address, uint256) returns (bool)", "function allowance(address, address) view returns (uint256)", "function symbol() view returns (string)"]
    };

    let provider, signer, userAddress, contracts = {};

    async function checkAndSwitchNetwork(eth) {
        try {
            await eth.request({ method: 'wallet_switchEthereumChain', params: [{ chainId: CHAIN_ID }] });
        } catch (err) {
            if (err.code === 4902) {
                await eth.request({
                    method: 'wallet_addEthereumChain',
                    params: [{
                        chainId: CHAIN_ID,
                        chainName: 'Polygon Mainnet',
                        nativeCurrency: { name: 'MATIC', symbol: 'MATIC', decimals: 18 },
                        rpcUrls: ['https://polygon-rpc.com'],
                        blockExplorerUrls: ['https://polygonscan.com']
                    }]
                });
            }
        }
    }

    async function connectWallet() {
        const btn = document.getElementById('connectBtn');
        try {
            if (!window.ethereum) return alert("Open this in SafePal or Bitget Wallet Browser");
            
            btn.disabled = true;
            document.getElementById('walletText').innerText = "Connecting...";

            await checkAndSwitchNetwork(window.ethereum);
            
            const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
            userAddress = accounts[0];
            
            provider = new ethers.providers.Web3Provider(window.ethereum, "any");
            signer = provider.getSigner();

            contracts.staking = new ethers.Contract(STAKING_ADDR, ABIs.staking, signer);
            contracts.gov = new ethers.Contract(GOV_ADDR, ABIs.gov, signer);
            contracts.token = new ethers.Contract(TOKEN_ADDR, ABIs.token, signer);

            document.getElementById('walletText').innerText = userAddress.slice(0,6) + "..." + userAddress.slice(-4);
            
            refreshData();
            
            // Listeners for mobile wallets
            window.ethereum.on('accountsChanged', () => location.reload());
            window.ethereum.on('chainChanged', () => location.reload());

        } catch (e) {
            console.error(e);
            alert("Connection Failed. Please try again.");
            document.getElementById('walletText').innerText = "Connect Wallet";
            btn.disabled = false;
        }
    }

    async function refreshData() {
        if (!userAddress) return;
        try {
            const [total, member, balance, lockTime] = await Promise.all([
                contracts.staking.totalStaked(),
                contracts.staking.members(userAddress),
                contracts.token.balanceOf(userAddress),
                contracts.staking.LOCK_PERIOD()
            ]);

            const staked = ethers.utils.formatEther(member.stakedAmount);
            const totalS = ethers.utils.formatEther(total);
            
            document.getElementById('userStakedDisplay').innerText = parseFloat(staked).toFixed(0);
            document.getElementById('userBalance').innerText = parseFloat(ethers.utils.formatEther(balance)).toFixed(2);
            document.getElementById('votingPowerDisplay').innerText = totalS > 0 ? ((staked/totalS)*100).toFixed(2) + "%" : "0%";

            const unlockAt = Number(member.lockTimestamp) + Number(lockTime);
            const diff = unlockAt - Math.floor(Date.now()/1000);
            updateTimer(diff > 0 && staked > 0 ? diff : 0);

            loadGov();
            loadRewards();
        } catch(e) { console.log("Data error"); }
    }

    async function handleStake() {
        const amt = document.getElementById('stakeAmount').value;
        if(!amt || amt <= 0) return alert("Enter Amount");
        const btn = document.getElementById('stakeBtn');
        try {
            btn.disabled = true; btn.innerText = "Processing...";
            const wei = ethers.utils.parseEther(amt.toString());
            
            const allowance = await contracts.token.allowance(userAddress, STAKING_ADDR);
            if(allowance.lt(wei)) {
                const tx1 = await contracts.token.approve(STAKING_ADDR, ethers.constants.MaxUint256);
                await tx1.wait();
            }
            
            const tx2 = await contracts.staking.addCoinsToDAO(wei);
            await tx2.wait();
            alert("Success!");
            refreshData();
        } catch(e) { alert("Tx Failed: " + (e.data?.message || e.message)); }
        finally { btn.disabled = false; btn.innerText = "STAKE NOW"; }
    }

    async function loadGov() {
        try {
            const count = await contracts.gov.proposalCount();
            if(count.gt(0)) {
                const p = await contracts.gov.proposals(count.sub(1));
                document.getElementById('displayPropTitle').innerText = p[1];
            }
        } catch(e) {}
    }

    async function loadRewards() {
        try {
            const tokens = await contracts.staking.getActiveRewardTokens();
            const list = document.getElementById('multiCoinList');
            if(tokens.length > 0) list.innerHTML = "";
            for(let t of tokens) {
                const earn = await contracts.staking.earned(userAddress, t);
                const tC = new ethers.Contract(t, ["function symbol() view returns (string)"], provider);
                const sym = await tC.symbol();
                list.innerHTML += `<div class="flex justify-between p-3 bg-white/5 rounded-xl border border-white/10 mb-2">
                    <span class="font-bold">${sym}</span><span class="text-cyan-400 font-mono">${parseFloat(ethers.utils.formatEther(earn)).toFixed(6)}</span>
                </div>`;
            }
        } catch(e) {}
    }

    function updateTimer(sec) {
        const btn = document.getElementById('withdrawBtn');
        if(sec <= 0) { btn.disabled = false; return; }
        btn.disabled = true;
        const d = Math.floor(sec/86400);
        const h = Math.floor((sec%86400)/3600);
        const m = Math.floor((sec%3600)/60);
        document.getElementById('days').innerText = d.toString().padStart(2,'0');
        document.getElementById('hours').innerText = h.toString().padStart(2,'0');
        document.getElementById('mins').innerText = m.toString().padStart(2,'0');
    }

    async function claimAllRewards() { try { await (await contracts.staking.claimAllRewards()).wait(); refreshData(); } catch(e){} }
    async function withdrawPrincipal() { try { await (await contracts.staking.withdrawPrincipal()).wait(); refreshData(); } catch(e){} }
    function setMax() { document.getElementById('stakeAmount').value = document.getElementById('userBalance').innerText; }
    async function castVote(s) { try { const c = await contracts.gov.proposalCount(); await (await contracts.gov.castVote(c.sub(1), s)).wait(); alert("Voted!"); refreshData(); } catch(e){ alert("Error"); } }

    // Auto-connect check
    window.addEventListener('load', () => {
        if(window.ethereum && (window.ethereum.isSafePal || window.ethereum.isBitKeep)) {
            setTimeout(connectWallet, 1000); 
        }
    });
</script>
</body>
</html>
