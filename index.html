<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>AsiaX Pro • Master DAO</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { background: linear-gradient(135deg, #0f001a 0%, #05000f 100%); color: #e0e0ff; font-family: 'Inter', sans-serif; min-height: 100vh; margin: 0; }
        .glass { background: rgba(30, 20, 60, 0.4); backdrop-filter: blur(12px); border: 1px solid rgba(100, 100, 255, 0.15); border-radius: 1.25rem; }
        .connect-btn { background: linear-gradient(90deg, #00d4ff, #7b00ff); box-shadow: 0 4px 15px rgba(0, 212, 255, 0.3); transition: all 0.3s ease; }
        .vote-box { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 1rem; color: white; cursor: pointer; }
        .action-input { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); color: white; outline: none; }
        .withdraw-btn { background: linear-gradient(90deg, #ff4b2b, #ff416c); }
        .withdraw-btn:disabled { opacity: 0.3; filter: grayscale(1); cursor: not-allowed; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="antialiased p-4">

<div class="max-w-xl mx-auto space-y-6">
    <!-- same HTML as before (header, grids, sections) -->
    <div class="flex justify-between items-center px-1 pt-4">
        <div class="text-xl font-bold tracking-tight bg-gradient-to-r from-cyan-400 to-purple-500 bg-clip-text text-transparent">ASIAX2 DAO</div>
        <button id="connectBtn" class="connect-btn text-white text-xs font-bold px-5 py-2.5 rounded-full flex items-center gap-2" onclick="connectWallet()">
            <i class="fa-solid fa-wallet"></i> <span id="walletText">Connect Wallet</span>
        </button>
    </div>

    <!-- baaki pura HTML same rakha hai (voting, rewards, stake, withdraw) -->
    <!-- copy kar lena previous code se yahan tak -->

    <div class="glass p-5">
        <div class="flex justify-between items-center mb-4">
            <span class="font-bold text-cyan-400 text-xs">My Rewards</span>
            <button onclick="claimAllRewards()" class="bg-cyan-500 text-black text-[9px] font-bold px-3 py-1 rounded">CLAIM ALL</button>
        </div>
        <div id="multiCoinList" class="space-y-2 text-xs italic text-gray-500 text-center">Wallet not connected</div>
    </div>

    <!-- stake aur withdraw section same -->

</div>

<script>
    // --- CONFIG ---
    const STAKING_ADDR = "0x23E12941383c7de11D8ab066Ba96897535DD3e48";
    const GOV_ADDR = "0x074fF1363A23EE4142963bD34e4f88F7552C2ea1";
    const TOKEN_ADDR = "0x80675dCe080d52dD842e93bF3bc15E28dACD78CB";
    const CHAIN_ID = "0x89";

    const ABIs = { /* same as before */ };

    let provider, signer, userAddress, contracts = {};

    function getWalletProvider() {
        if (window.safepalProvider) {
            console.log("✅ SafePal Official Provider Detected");
            return window.safepalProvider;
        }
        if (window.ethereum && window.ethereum.isSafePal) {
            console.log("✅ SafePal via ethereum.isSafePal");
            return window.ethereum;
        }
        if (window.ethereum) {
            console.log("✅ Other wallet (Trust/MetaMask)");
            return window.ethereum;
        }
        return null;
    }

    async function checkAndSwitchNetwork(walletProvider) {
        try {
            await walletProvider.request({ method: 'wallet_switchEthereumChain', params: [{ chainId: CHAIN_ID }] });
        } catch (err) {
            if (err.code === 4902) {
                await walletProvider.request({
                    method: 'wallet_addEthereumChain',
                    params: [{
                        chainId: CHAIN_ID,
                        chainName: 'Polygon Mainnet',
                        nativeCurrency: { name: 'MATIC', symbol: 'MATIC', decimals: 18 },
                        rpcUrls: ['https://polygon-rpc.com'],
                        blockExplorerUrls: ['https://polygonscan.com']
                    }]
                });
            } else {
                throw err;
            }
        }
    }

    async function connectWallet() {
        const btn = document.getElementById('connectBtn');
        try {
            const walletProvider = getWalletProvider();
            if (!walletProvider) {
                return alert("❌ SafePal Provider nahi mila!\n\nSafePal App ke andar 'Discover' section se dApp kholo.\nYa phir https://www.safepal.com/download se latest SafePal download karo.");
            }

            btn.disabled = true;
            document.getElementById('walletText').innerText = "Connecting...";

            await checkAndSwitchNetwork(walletProvider);

            const accounts = await walletProvider.request({ method: 'eth_requestAccounts' });
            userAddress = accounts[0];

            provider = new ethers.providers.Web3Provider(walletProvider, "any");
            signer = provider.getSigner();

            contracts.staking = new ethers.Contract(STAKING_ADDR, ABIs.staking, signer);
            contracts.gov = new ethers.Contract(GOV_ADDR, ABIs.gov, signer);
            contracts.token = new ethers.Contract(TOKEN_ADDR, ABIs.token, signer);

            document.getElementById('walletText').innerText = userAddress.slice(0,6) + "..." + userAddress.slice(-4);

            refreshData();

            // listeners
            walletProvider.on('accountsChanged', () => location.reload());
            walletProvider.on('chainChanged', () => location.reload());

            console.log("✅ Connected successfully with SafePal!");

        } catch (e) {
            console.error(e);
            let msg = e.message || "Unknown";
            if (e.code === 4001) msg = "User rejected connection";
            if (e.code === 4902) msg = "Chain add failed";
            alert("Connection Failed: " + msg);
            document.getElementById('walletText').innerText = "Connect Wallet";
            btn.disabled = false;
        }
    }

    // baaki functions (refreshData, handleStake, loadGov, loadRewards, updateTimer, claim, withdraw, setMax, castVote) **exactly same** rakho jaise previous code mein the

    // Auto-connect hata diya (user gesture ke liye)
    // window.addEventListener('load', ...) → comment out ya delete kar do

</script>
</body>
</html>
