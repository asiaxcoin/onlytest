<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>AsiaX Pro • Master DAO</title>
    
    <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { background: linear-gradient(135deg, #0f001a 0%, #05000f 100%); color: #e0e0ff; font-family: 'Inter', sans-serif; min-height: 100vh; margin: 0; }
        .glass { background: rgba(30, 20, 60, 0.4); backdrop-filter: blur(12px); border: 1px solid rgba(100, 100, 255, 0.15); border-radius: 1.25rem; }
        .connect-btn { background: linear-gradient(90deg, #00d4ff, #7b00ff); box-shadow: 0 4px 15px rgba(0, 212, 255, 0.3); transition: all 0.3s ease; }
        .vote-box { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 1rem; color: white; cursor: pointer; }
        .action-input { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); color: white; outline: none; }
        .withdraw-btn { background: linear-gradient(90deg, #ff4b2b, #ff416c); }
        .withdraw-btn:disabled { opacity: 0.3; filter: grayscale(1); cursor: not-allowed; }
    </style>
</head>
<body class="antialiased p-4">

<div class="max-w-xl mx-auto space-y-6">
    <div class="flex justify-between items-center px-1 pt-4">
        <div class="text-xl font-bold tracking-tight bg-gradient-to-r from-cyan-400 to-purple-500 bg-clip-text text-transparent">ASIAX DAO</div>
        <button id="connectBtn" class="connect-btn text-white text-xs font-bold px-5 py-2.5 rounded-full flex items-center gap-2" onclick="connectWallet()">
            <i class="fa-solid fa-wallet"></i> <span id="walletText">Connect Wallet</span>
        </button>
    </div>

    <div class="grid grid-cols-3 gap-2">
        <div class="glass p-3 text-center border-b-2 border-cyan-500/50">
            <div class="text-[9px] text-gray-400 uppercase">Power</div>
            <div class="text-sm font-bold" id="votingPowerDisplay">0%</div>
        </div>
        <div class="glass p-3 text-center border-b-2 border-purple-500/50">
            <div class="text-[9px] text-gray-400 uppercase">Staked</div>
            <div class="text-sm font-bold" id="userStakedDisplay">0</div>
        </div>
        <div class="glass p-3 text-center border-b-2 border-cyan-500/50">
            <div class="text-[9px] text-gray-400 uppercase">Badge</div>
            <div class="text-[10px] font-bold text-cyan-400" id="badgeDisplay">VISITOR</div>
        </div>
    </div>

    <div class="glass p-5">
        <h2 class="text-xs font-bold text-cyan-400 uppercase mb-4">Governance Vote</h2>
        <div class="text-center">
            <h3 id="displayPropTitle" class="text-md font-bold mb-1">No Active Proposal</h3>
            <div class="grid grid-cols-2 gap-3 mt-4">
                <button onclick="castVote(true)" class="vote-box py-3 text-sm font-bold">YES <span id="resA" class="block text-[9px] text-gray-500">0%</span></button>
                <button onclick="castVote(false)" class="vote-box py-3 text-sm font-bold">NO <span id="resB" class="block text-[9px] text-gray-500">0%</span></button>
            </div>
        </div>
    </div>

    <div class="glass p-5">
        <div class="flex justify-between items-center mb-4">
            <span class="font-bold text-cyan-400 text-xs">My Rewards</span>
            <button onclick="claimAllRewards()" class="bg-cyan-500 text-black text-[9px] font-bold px-3 py-1 rounded">CLAIM ALL</button>
        </div>
        <div id="multiCoinList" class="space-y-2 text-xs italic text-gray-500">Connect wallet to see rewards</div>
    </div>

    <div class="glass p-5 border border-purple-500/20">
        <div class="flex justify-between mb-4">
            <h2 class="text-md font-bold text-white">Stake AsiaX</h2>
            <div class="text-[10px] text-cyan-300">Wallet: <span id="userBalance">0.00</span></div>
        </div>
        <div class="relative mb-4">
            <input type="number" id="stakeAmount" placeholder="0.0" class="action-input w-full p-3 rounded-xl text-sm" />
            <button onclick="setMax()" class="absolute right-3 top-1/2 -translate-y-1/2 text-[10px] text-cyan-300 font-bold">MAX</button>
        </div>
        <button id="stakeBtn" onclick="handleStake()" class="connect-btn w-full text-white font-bold py-3.5 rounded-xl text-sm">STAKE NOW</button>
    </div>

    <div class="glass p-5 border border-red-500/20">
        <div class="flex justify-around items-center mb-5">
            <div class="text-center"><div id="days" class="text-xl font-bold">00</div><div class="text-[9px] uppercase">Days</div></div>
            <div class="text-center"><div id="hours" class="text-xl font-bold">00</div><div class="text-[9px] uppercase">Hrs</div></div>
            <div class="text-center"><div id="mins" class="text-xl font-bold">00</div><div class="text-[9px] uppercase">Mins</div></div>
        </div>
        <button id="withdrawBtn" disabled onclick="withdrawPrincipal()" class="withdraw-btn w-full text-white font-bold py-3.5 rounded-xl text-xs">WITHDRAW PRINCIPAL</button>
    </div>
</div>

<script>

   // ================== CONFIG ==================
    const STAKING_ADDR = "0x23E12941383c7de11D8ab066Ba96897535DD3e48";
   const GOV_ADDR = "0x074fF1363A23EE4142963bD34e4f88F7552C2ea1";
 const TOKEN_ADDR = "0x80675dCe080d52dD842e93bF3bc15E28dACD78CB";
 
   // ABI definitions (Standard v5)
    const STAKING_ABI = [
        "function totalStaked() view returns (uint256)",
        "function members(address) view returns (uint256 stakedAmount, uint256 lockTimestamp)",
        "function LOCK_PERIOD() view returns (uint256)",
        "function getActiveRewardTokens() view returns (address[])",
        "function earned(address, address) view returns (uint256)",
        "function addCoinsToDAO(uint256)",
        "function claimAllRewards()",
        "function withdrawPrincipal()"
    ];
    const GOV_ABI = [
        "function proposalCount() view returns (uint256)",
        "function proposals(uint256) view returns (address, string, uint256, uint256, uint256, bool)",
        "function castVote(uint256, bool)"
    ];
    const TOKEN_ABI = [
        "function balanceOf(address) view returns (uint256)",
        "function approve(address, uint256) returns (bool)",
        "function allowance(address, address) view returns (uint256)",
        "function symbol() view returns (string)"
    ];

    let provider, signer, stakingContract, govContract, tokenContract, userAddress;

    // Connect Wallet Logic for SafePal & Mobile
    async function connectWallet() {
        try {
            if (!window.ethereum) return alert("Please open in SafePal/TrustWallet browser");

            // Universal provider detection
            const ethProvider = window.ethereum;
            provider = new ethers.providers.Web3Provider(ethProvider, "any");

            // Account Request
            const accounts = await ethProvider.request({ method: 'eth_requestAccounts' });
            userAddress = accounts[0];
            signer = provider.getSigner();

            // Contracts Init
            stakingContract = new ethers.Contract(STAKING_ADDR, STAKING_ABI, signer);
            govContract = new ethers.Contract(GOV_ADDR, GOV_ABI, signer);
            tokenContract = new ethers.Contract(TOKEN_ADDR, TOKEN_ABI, signer);

            document.getElementById('walletText').innerText = userAddress.slice(0,6) + "...";
            
            // Refresh Data
            refreshData();
        } catch (e) {
            alert("Connection Failed: " + e.message);
        }
    }

    async function refreshData() {
        if (!userAddress) return;
        try {
            const total = await stakingContract.totalStaked();
            const member = await stakingContract.members(userAddress);
            const balance = await tokenContract.balanceOf(userAddress);

            const stakedEth = parseFloat(ethers.utils.formatEther(member.stakedAmount));
            const totalEth = parseFloat(ethers.utils.formatEther(total));

            document.getElementById('userStakedDisplay').innerText = stakedEth.toFixed(0);
            document.getElementById('userBalance').innerText = parseFloat(ethers.utils.formatEther(balance)).toFixed(2);
            document.getElementById('votingPowerDisplay').innerText = totalEth > 0 ? ((stakedEth/totalEth)*100).toFixed(2) + "%" : "0%";

            const lockPeriod = await stakingContract.LOCK_PERIOD();
            const unlockTime = Number(member.lockTimestamp) + Number(lockPeriod);
            const remaining = unlockTime - Math.floor(Date.now()/1000);
            updateTimer(remaining > 0 && stakedEth > 0 ? remaining : 0);

            loadActiveProposal();
            loadRewards();
        } catch(e) { console.error(e); }
    }

    async function handleStake() {
        const amt = document.getElementById('stakeAmount').value;
        if(!amt || amt <= 0) return alert("Enter amount");
        const wei = ethers.utils.parseEther(amt);
        try {
            const allowance = await tokenContract.allowance(userAddress, STAKING_ADDR);
            if(allowance.lt(wei)) {
                const txApp = await tokenContract.approve(STAKING_ADDR, ethers.constants.MaxUint256);
                await txApp.wait();
            }
            const txStake = await stakingContract.addCoinsToDAO(wei);
            await txStake.wait();
            alert("Success: Staked!");
            refreshData();
        } catch(e) { alert("Error: " + (e.reason || "Transaction Failed")); }
    }

    async function loadActiveProposal() {
        try {
            const count = await govContract.proposalCount();
            if(count == 0) return;
            const p = await govContract.proposals(count.sub(1));
            document.getElementById('displayPropTitle').innerText = p[1];
        } catch(e) { }
    }

    async function loadRewards() {
        try {
            const tokens = await stakingContract.getActiveRewardTokens();
            const list = document.getElementById('multiCoinList');
            if(tokens.length > 0) list.innerHTML = "";
            for(let t of tokens) {
                const earn = await stakingContract.earned(userAddress, t);
                const tC = new ethers.Contract(t, ["function symbol() view returns (string)"], provider);
                const sym = await tC.symbol();
                list.innerHTML += `<div class="flex justify-between p-2 bg-white/5 rounded-lg border border-white/5">
                    <span>${sym}</span><span class="text-cyan-400">${parseFloat(ethers.utils.formatEther(earn)).toFixed(4)}</span>
                </div>`;
            }
        } catch(e) { }
    }

    function updateTimer(sec) {
        if(sec <= 0) { document.getElementById('withdrawBtn').disabled = false; return; }
        document.getElementById('withdrawBtn').disabled = true;
        document.getElementById('days').innerText = Math.floor(sec/86400).toString().padStart(2,'0');
        document.getElementById('hours').innerText = Math.floor((sec%86400)/3600).toString().padStart(2,'0');
        document.getElementById('mins').innerText = Math.floor((sec%3600)/60).toString().padStart(2,'0');
    }

    async function castVote(support) {
        try {
            const count = await govContract.proposalCount();
            const tx = await govContract.castVote(count.sub(1), support);
            await tx.wait();
            alert("Vote Casted!");
            refreshData();
        } catch(e) { alert("Voting Error"); }
    }

    async function claimAllRewards() { await (await stakingContract.claimAllRewards()).wait(); refreshData(); }
    async function withdrawPrincipal() { await (await stakingContract.withdrawPrincipal()).wait(); refreshData(); }
    function setMax() { document.getElementById('stakeAmount').value = document.getElementById('userBalance').innerText; }
</script>
</body>
</html>
