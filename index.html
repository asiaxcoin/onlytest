<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>AsiaX Pro • Master DAO</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
    body { background: linear-gradient(135deg, #0f001a 0%, #05000f 100%); color: #e0e0ff; font-family: 'Inter', sans-serif; min-height: 100vh; margin: 0; }
    .glass { background: rgba(30, 20, 60, 0.4); backdrop-filter: blur(12px); border: 1px solid rgba(100, 100, 255, 0.15); border-radius: 1.25rem; }
    .connect-btn { background: linear-gradient(90deg, #00d4ff, #7b00ff); box-shadow: 0 4px 15px rgba(0, 212, 255, 0.3); }
    .vote-box { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 1rem; }
    .action-input { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); color: white; outline: none; }
    .withdraw-btn { background: linear-gradient(90deg, #ff4b2b, #ff416c); }
    .withdraw-btn:disabled { opacity: 0.3; filter: grayscale(1); }
  </style>
</head>
<body class="antialiased p-3">

<div class="max-w-xl mx-auto space-y-6 pt-4">
  <!-- tumhara pura UI same (header, voting, rewards, stake, withdraw) -->
  <!-- ... copy from your original code ... -->

  <!-- NEW DEBUG PANEL (test ke liye) -->
  <div class="glass p-4 text-[10px] mt-4">
    <div class="font-bold text-red-400 mb-2">🔍 SAFE PAL DEBUG INFO</div>
    <div>Chain ID: <span id="chainDisplay" class="font-mono text-cyan-400">?</span></div>
    <div>AsiaX Balance Raw: <span id="rawBalance" class="font-mono text-cyan-400">0</span></div>
    <div>Decimals: <span id="decimalsDisplay" class="font-mono text-cyan-400">?</span></div>
    <button onclick="refreshData()" class="mt-2 text-[9px] bg-white/10 px-3 py-1 rounded">Refresh Debug</button>
  </div>
</div>

<script>

   // ================== CONFIG ==================
    const STAKING_ADDR = "0x23E12941383c7de11D8ab066Ba96897535DD3e48";
   const GOV_ADDR = "0x074fF1363A23EE4142963bD34e4f88F7552C2ea1";
 const TOKEN_ADDR = "0x80675dCe080d52dD842e93bF3bc15E28dACD78CB";
  const TARGET_CHAIN_ID = 137;
  const TARGET_CHAIN_HEX = "0x89";

   const STAKING_ABI = [
    "function totalStaked() view returns (uint256)",
    "function members(address) view returns (uint256 stakedAmount, uint256 lockTimestamp)",
    "function LOCK_PERIOD() view returns (uint256)",
    "function getActiveRewardTokens() view returns (address[])",
    "function earned(address, address) view returns (uint256)",
    "function addCoinsToDAO(uint256)",
    "function claimAllRewards()",
    "function withdrawPrincipal()"
  ];
    const GOV_ABI     = [
    "function proposalCount() view returns (uint256)",
    "function proposals(uint256) view returns (address, string, uint256, uint256, uint256, bool)",
    "function castVote(uint256, bool)"
  ];
  const TOKEN_ABI   = [
    "function balanceOf(address) view returns (uint256)",
    "function approve(address, uint256) returns (bool)",
    "function allowance(address, address) view returns (uint256)",
    "function symbol() view returns (string)",
    "function decimals() view returns (uint8)"   // ← YE IMPORTANT ADD KIA
  ];

  let provider, signer, stakingContract, govContract, tokenContract, userAddress;

  // Auto + Connect same as pehle (previous message se)

  async function refreshData() {
    if (!userAddress || !provider) return;
    try {
      const network = await provider.getNetwork();
      document.getElementById('chainDisplay').innerText = 
        network.chainId + (network.chainId === TARGET_CHAIN_ID ? " ✅ POLYGON" : " ❌ WRONG NETWORK!");

      if (network.chainId !== TARGET_CHAIN_ID) {
        document.getElementById('userBalance').innerText = "Switch to Polygon!";
        return;
      }

      // Balance with correct decimals
      const balance = await tokenContract.balanceOf(userAddress);
      const decimals = await tokenContract.decimals();
      const formatted = parseFloat(ethers.utils.formatUnits(balance, decimals)).toFixed(4);

      document.getElementById('userBalance').innerText = formatted;
      document.getElementById('rawBalance').innerText = balance.toString();
      document.getElementById('decimalsDisplay').innerText = decimals;

      // tumhara baaki refresh logic (staked, votingPower, timer, proposal, rewards) yahan paste kar do
      // ...

    } catch(e) { console.error(e); }
  }

  async function handleStake() {
    if (!userAddress) return alert("Connect wallet first");
    const amtStr = document.getElementById('stakeAmount').value.trim();
    if (!amtStr || Number(amtStr) <= 0) return alert("Amount > 0 daalo");

    try {
      const wei = ethers.utils.parseEther(amtStr);   // agar decimals 18 nahi toh adjust karna padega

      // Balance check
      const decimals = await tokenContract.decimals();
      const balance = await tokenContract.balanceOf(userAddress);
      if (balance.lt(wei)) {
        return alert(`Kam balance! Tumhare paas ${ethers.utils.formatUnits(balance, decimals)} AsiaX hai`);
      }

      // Approve
      const allowance = await tokenContract.allowance(userAddress, STAKING_ADDR);
      if (allowance.lt(wei)) {
        alert("Approving... SafePal mein confirm karo");
        const txApp = await tokenContract.approve(STAKING_ADDR, ethers.constants.MaxUint256);
        await txApp.wait();
      }

      // SIMULATE → exact revert reason milega!
      alert("Simulating stake (reason check)...");
      await stakingContract.callStatic.addCoinsToDAO(wei);

      alert("Simulation OK! Ab real transaction bhej raha...");
      const tx = await stakingContract.addCoinsToDAO(wei, { gasLimit: 400000 });
      await tx.wait();

      alert("✅ Stake successful! Tx: " + tx.hash);
      refreshData();

    } catch (e) {
      console.error("Full error:", e);
      const reason = e.reason || e.message || e.data || "Unknown revert";
      alert(`❌ Stake Failed!\n\nExact Contract Reason: ${reason}\n\n(Yeh reason copy karke mujhe bhej do)`);
    }
  }

  // baaki functions (castVote, claim, withdraw, setMax etc.) same rakh sakte ho

</script>
</body>
</html>
