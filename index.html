<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AsiaX DAO Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0b0e11; color: #eaecef; padding: 20px; text-align: center; }
        .container { max-width: 500px; margin: auto; }
        .card { background: #1e2329; padding: 20px; border-radius: 12px; margin: 15px 0; border: 1px solid #333; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        button { background: #f3ba2f; color: #000; border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; margin: 8px 0; transition: 0.3s; }
        button:hover { background: #db9e15; }
        input { width: calc(100% - 24px); padding: 10px; margin: 10px 0; border-radius: 6px; border: 1px solid #474d57; background: #121212; color: white; }
        .status { color: #f3ba2f; font-size: 0.9rem; margin-bottom: 20px; word-break: break-all; }
        .label { text-align: left; font-size: 0.8rem; color: #848e9c; }
    </style>
</head>
<body>

    <div class="container">
        <h1>AsiaX1 DAO</h1>
        <div id="status" class="status">Wallet Not Connected</div>
        <button id="connectBtn">Connect SafePal / Trust Wallet</button>

        <div class="card">
            <h3>Staking Portal</h3>
            <div class="label">Your Staked: <span id="stakedBalance" style="color: white;">0</span> AsiaX</div>
            <input type="number" id="stakeAmount" placeholder="Amount to Stake">
            <button onclick="handleStake()">Stake Tokens</button>
            <button onclick="handleClaim()" style="background: #2ebd85; color: white;">Claim Rewards</button>
            <button onclick="handleWithdraw()" style="background: #f6465d; color: white;">Withdraw Principal</button>
        </div>

        <div class="card">
            <h3>DAO Governance</h3>
            <input type="text" id="propTitle" placeholder="Proposal Title">
            <button onclick="handleCreateProposal()" style="background: #007bff; color: white;">Create Proposal</button>
            <hr style="border: 0.1px solid #333; margin: 15px 0;">
            <input type="number" id="propId" placeholder="Proposal ID">
            <div style="display: flex; gap: 10px;">
                <button onclick="handleVote(true)">Vote YES</button>
                <button onclick="handleVote(false)" style="background: #f6465d; color: white;">Vote NO</button>
            </div>
        </div>
    </div>

    <script>
        // --- CONFIGURATION (Bhai yahan apne addresses dalo) ---
        const TOKEN_ADDR = "0x80675dCe080d52dD842e93bF3bc15E28dACD78CB";
        const STAKING_ADDR = "0x831759FCA93d9bCD7119a997f951Cc62eD2CAa2c";
        const GOV_ADDR = "0xeeA40E06c83649f8B0c10c40391bF38FaD7d805b";

        // --- ABIs (Remix se copy karke yahan dalo) ---
        const ERC20_ABI = [ "function approve(address spender, uint256 amount) public returns (bool)", "function balanceOf(address account) view returns (uint256)" ];
        const STAKING_ABI = [
            "function stake(uint256 amount) external",
            "function withdraw(uint256 amount) external",
            "function claimRewards() external",
            "function getStakedAmount(address user) view returns (uint256)"
        ];
        const GOV_ABI = [
            "function createProposal(string title) external",
            "function castVote(uint256 proposalId, bool support) external"
        ];

        let provider, signer, tokenContract, stakingContract, govContract;

        // Wallet Connection Logic
        document.getElementById('connectBtn').onclick = async () => {
            if (window.ethereum) {
                provider = new ethers.providers.Web3Provider(window.ethereum);
                await provider.send("eth_requestAccounts", []);
                signer = provider.getSigner();
                const address = await signer.getAddress();
                
                document.getElementById('status').innerText = "Connected: " + address;
                
                // Contracts Initialization
                tokenContract = new ethers.Contract(TOKEN_ADDR, ERC20_ABI, signer);
                stakingContract = new ethers.Contract(STAKING_ADDR, STAKING_ABI, signer);
                govContract = new ethers.Contract(GOV_ADDR, GOV_ABI, signer);
                
                refreshData();
            } else {
                alert("Please use SafePal or Trust Wallet browser!");
            }
        };

        async function refreshData() {
            const address = await signer.getAddress();
            const staked = await stakingContract.getStakedAmount(address);
            document.getElementById('stakedBalance').innerText = ethers.utils.formatEther(staked);
        }

        async function handleStake() {
            try {
                const amount = ethers.utils.parseEther(document.getElementById('stakeAmount').value);
                document.getElementById('status').innerText = "Approving...";
                const tx1 = await tokenContract.approve(STAKING_ADDR, amount);
                await tx1.wait();
                
                document.getElementById('status').innerText = "Staking...";
                const tx2 = await stakingContract.stake(amount);
                await tx2.wait();
                
                document.getElementById('status').innerText = "Staked Successfully!";
                refreshData();
            } catch (e) { alert("Error: " + e.message); }
        }

        async function handleClaim() {
            try {
                const tx = await stakingContract.claimRewards();
                await tx.wait();
                alert("Rewards Claimed!");
            } catch (e) { alert(e.message); }
        }

        async function handleWithdraw() {
            try {
                const amount = ethers.utils.parseEther(document.getElementById('stakeAmount').value);
                const tx = await stakingContract.withdraw(amount);
                await tx.wait();
                refreshData();
            } catch (e) { alert("Lock period not over or error: " + e.message); }
        }

        async function handleCreateProposal() {
            const title = document.getElementById('propTitle').value;
            const tx = await govContract.createProposal(title);
            await tx.wait();
            alert("Proposal Created!");
        }

        async function handleVote(side) {
            const id = document.getElementById('propId').value;
            const tx = await govContract.castVote(id, side);
            await tx.wait();
            alert("Voted!");
        }
    </script>
</body>
</html>
