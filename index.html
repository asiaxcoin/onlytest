<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>AsiaX Pro • Master DAO</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.13.4/ethers.umd.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
    body { background: linear-gradient(135deg, #0f001a 0%, #05000f 100%); color: #e0e0ff; font-family: 'Inter', sans-serif; min-height: 100vh; margin: 0; }
    .glass { background: rgba(30, 20, 60, 0.4); backdrop-filter: blur(12px); border: 1px solid rgba(100, 100, 255, 0.15); border-radius: 1.5rem; }
    .neon-border { box-shadow: 0 0 15px rgba(0, 255, 255, 0.1); }
    .connect-btn { background: linear-gradient(90deg, #00d4ff, #7b00ff); box-shadow: 0 8px 20px rgba(0, 212, 255, 0.3); transition: all 0.3s ease; }
    .vote-box { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 1rem; transition: 0.3s; color: white; cursor: pointer; }
    .vote-box:hover { background: rgba(0, 212, 255, 0.1); border-color: #00d4ff; color: #00d4ff; }
    .action-input { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); color: white; outline: none; }
    .dao-table-container { max-height: 400px; overflow-y: auto; }
    .withdraw-btn { background: linear-gradient(90deg, #ff4b2b, #ff416c); transition: all 0.3s; }
  </style>
</head>
<body class="antialiased p-4 sm:p-6">

<div class="max-w-2xl mx-auto px-2 sm:px-4 py-6 sm:py-8">
  <div class="flex justify-between items-center mb-10">
    <div class="text-2xl sm:text-3xl font-bold tracking-tight bg-gradient-to-r from-cyan-400 to-purple-500 bg-clip-text text-transparent">ASIAX DAO</div>
    <button id="connectBtn" class="connect-btn text-white text-sm font-bold px-5 py-2.5 rounded-full flex items-center gap-2" onclick="connectWallet()">
      <i class="fa-solid fa-wallet"></i> <span id="walletText">Connect Wallet</span>
    </button>
  </div>

  <div class="grid grid-cols-3 gap-3 mb-8 text-center">
    <div class="glass p-4 border-b-2 border-purple-600/50">
      <div class="text-[10px] text-gray-400 uppercase">Voting Power</div>
      <div class="text-xl font-bold" id="votingPowerDisplay">0.00%</div>
    </div>
    <div class="glass p-4 border-b-2 border-purple-600/50">
      <div class="text-[10px] text-gray-400 uppercase">My Rank</div>
      <div class="text-xl font-bold" id="userRankDisplay">--</div>
    </div>
    <div class="glass p-4 border-b-2 border-purple-600/50">
      <div class="text-[10px] text-gray-400 uppercase">Badge</div>
      <div class="text-sm font-bold text-cyan-400" id="badgeDisplay">VISITOR 🐟</div>
    </div>
  </div>

  <div class="glass p-6 mb-10 border border-white/10">
    <h2 class="text-sm font-bold text-cyan-400 uppercase tracking-widest mb-4"><i class="fa-solid fa-plus-circle mr-2"></i>Create New Proposal</h2>
    <div class="space-y-3">
        <input type="text" id="propTitle" placeholder="Proposal Title" class="action-input w-full p-3 rounded-xl text-sm" />
        <textarea id="propDesc" placeholder="Describe your proposal..." class="action-input w-full p-3 rounded-xl text-sm h-20"></textarea>
        <button onclick="handleCreateProposal()" class="w-full bg-purple-600 hover:bg-purple-500 text-white font-bold py-3 rounded-xl text-sm transition">Submit Proposal to DAO</button>
    </div>
  </div>

  <div id="activeProposalSection" class="mb-10 text-center">
    <div class="text-xs text-cyan-400 font-bold uppercase tracking-[0.25em] mb-4">Live Governance Voting</div>
    <div class="glass p-6 mb-4">
        <h3 id="displayPropTitle" class="text-lg font-bold mb-2">No Active Proposal</h3>
        <p id="displayPropDesc" class="text-sm text-gray-400 mb-6 italic">Connect wallet to load active DAO questions</p>
        
        <div class="grid grid-cols-2 gap-3 mb-6">
            <button onclick="castVote('A')" class="vote-box py-4 text-xl font-bold">A <span id="resA" class="block text-[10px] text-gray-500">0%</span></button>
            <button onclick="castVote('B')" class="vote-box py-4 text-xl font-bold">B <span id="resB" class="block text-[10px] text-gray-500">0%</span></button>
            <button onclick="castVote('C')" class="vote-box py-4 text-xl font-bold">C <span id="resC" class="block text-[10px] text-gray-500">0%</span></button>
            <button onclick="castVote('D')" class="vote-box py-4 text-xl font-bold">D <span id="resD" class="block text-[10px] text-gray-500">0%</span></button>
        </div>
    </div>
  </div>

  <div class="glass neon-border overflow-hidden mb-10 p-5">
    <div class="flex justify-between items-center mb-6 border-b border-white/10 pb-3">
        <span class="font-bold text-cyan-400 text-sm"><i class="fa-solid fa-coins mr-2"></i>My Unclaimed Rewards</span>
        <button onclick="claimAllRewards()" class="bg-cyan-500 text-black text-[10px] font-bold px-3 py-1 rounded-md uppercase">Claim All</button>
    </div>
    <div id="multiCoinList" class="space-y-3"></div>
  </div>

  <div class="text-xs text-gray-500 text-center mb-4 uppercase tracking-widest">Top Governance Token Holders</div>
  <div class="glass neon-border overflow-hidden mb-10">
    <div class="dao-table-container">
      <table class="w-full text-left text-sm">
        <thead class="text-gray-400 uppercase text-[10px] border-b border-white/5 sticky top-0 bg-[#160d2b]">
          <tr><th class="p-4">Rank</th><th class="p-4">Wallet</th><th class="p-4 text-right">Staked</th></tr>
        </thead>
        <tbody id="daoList"></tbody>
      </table>
    </div>
  </div>

  <div class="glass p-6 neon-border mb-8">
    <div class="flex flex-col sm:flex-row justify-between mb-6">
      <h2 class="text-lg font-bold text-white">Stake AsiaX</h2>
      <div class="text-sm text-cyan-300">Wallet: <span id="userBalance">0.00</span></div>
    </div>
    <div class="relative mb-4">
      <input type="number" id="stakeAmount" placeholder="Amount to stake" class="action-input w-full p-4 rounded-xl" />
      <button onclick="setMax()" class="absolute right-3 top-1/2 -translate-y-1/2 text-xs text-cyan-300">MAX</button>
    </div>
    <button id="stakeBtn" onclick="handleStake()" class="connect-btn w-full text-white font-bold py-4 rounded-xl">Join / Upgrade Rank</button>
  </div>

  <div class="glass p-6 border border-red-500/30">
    <div class="flex justify-between items-center mb-6">
        <div class="timer-box"><div id="days" class="text-xl font-bold">00</div><div class="text-[10px]">Days</div></div>
        <div class="timer-box"><div id="hours" class="text-xl font-bold">00</div><div class="text-[10px]">Hrs</div></div>
        <div class="timer-box"><div id="mins" class="text-xl font-bold">00</div><div class="text-[10px]">Mins</div></div>
    </div>
    <button id="withdrawBtn" disabled onclick="withdrawPrincipal()" class="withdraw-btn w-full text-white font-bold py-4 rounded-xl uppercase">Withdraw Principal</button>
  </div>
</div>

<script>
  // CONFIGURATION
  const DAO_ADDRESS = "0x9AD8D183A0d020a47992DAa20D6bfaEa937b5976";
  const TOKEN_ADDRESS = "0x80675dCe080d52dD842e93bF3bc15E28dACD78CB";
  
  // ABI WITH PROPOSALS
  const DAO_ABI = [
    "function totalStaked() view returns (uint256)",
    "function members(address) view returns (uint256 stakedAmount, uint256 lockTimestamp)",
    "function memberList(uint256) view returns (address)",
    "function getActiveRewardTokens() view returns (address[])",
    "function getPendingReward(address, address) view returns (uint256)",
    "function addCoinsToDAO(uint256)",
    "function claimAllRewards()",
    "function withdrawPrincipal()",
    "function getLockRemaining(address) view returns (uint256)",
    "function proposals(uint256) view returns (address, string, string, uint256, bool, uint256, uint256, uint256)",
    "function createProposal(string, string, string[])",
    "function castVote(uint256, string)"
  ];

  let provider, signer, daoContract, tokenContract, userAddress;

  async function connectWallet() {
    if (!window.ethereum) return alert("MetaMask not found");
    provider = new ethers.BrowserProvider(window.ethereum);
    const accounts = await provider.send("eth_requestAccounts", []);
    userAddress = accounts[0];
    signer = await provider.getSigner();
    daoContract = new ethers.Contract(DAO_ADDRESS, DAO_ABI, signer);
    tokenContract = new ethers.Contract(TOKEN_ADDRESS, ["function balanceOf(address) view returns (uint256)", "function approve(address, uint256) returns (bool)", "function allowance(address, address) view returns (uint256)"], signer);
    
    document.getElementById('walletText').innerText = userAddress.slice(0,6)+"...";
    refreshData();
  }

  async function refreshData() {
    if (!userAddress) return;
    const total = await daoContract.totalStaked();
    const userMember = await daoContract.members(userAddress);
    const lockRem = await daoContract.getLockRemaining(userAddress);
    const userBal = await tokenContract.balanceOf(userAddress);

    // Stats
    const stakeAmt = parseFloat(ethers.formatEther(userMember.stakedAmount));
    const totalAmt = parseFloat(ethers.formatEther(total));
    document.getElementById('votingPowerDisplay').innerText = totalAmt > 0 ? ((stakeAmt/totalAmt)*100).toFixed(2) + "%" : "0%";
    document.getElementById('userBalance').innerText = parseFloat(ethers.formatEther(userBal)).toFixed(2);
    
    updateTimer(Number(lockRem));
    loadLeaderboard();
    loadActiveProposal();
    loadRewards();
  }

  async function loadLeaderboard() {
    const listBody = document.getElementById('daoList');
    listBody.innerHTML = "";
    let members = [];
    
    // Yahan hum loop chala kar memberList se addresses nikalte hain (Demo ke liye pehle 10)
    for(let i=0; i<10; i++) {
        try {
            const addr = await daoContract.memberList(i);
            const data = await daoContract.members(addr);
            members.push({addr, stake: data.stakedAmount});
        } catch(e) { break; }
    }
    
    // Sort by Stake
    members.sort((a,b) => Number(b.stake - a.stake));
    members.forEach((m, index) => {
        listBody.innerHTML += `
            <tr class="border-b border-white/5 hover:bg-white/5">
                <td class="p-4 text-gray-500">#${index+1}</td>
                <td class="p-4 font-mono text-xs">${m.addr.slice(0,10)}...</td>
                <td class="p-4 text-right text-purple-400 font-bold">${parseFloat(ethers.formatEther(m.stake)).toFixed(0)}</td>
            </tr>`;
        if(m.addr.toLowerCase() === userAddress.toLowerCase()) document.getElementById('userRankDisplay').innerText = "#"+(index+1);
    });
  }

  async function loadActiveProposal() {
    try {
        // Contract mein proposals list hoti hai, hum sabse latest nikalte hain
        const p = await daoContract.proposals(0); // Demo: Index 0
        document.getElementById('displayPropTitle').innerText = p[1];
        document.getElementById('displayPropDesc').innerText = p[2];
        
        // Results calculation (dummy percentages for UI demo)
        const totalVotes = Number(p[5]) + Number(p[6]) + Number(p[7]);
        if(totalVotes > 0) {
            document.getElementById('resA').innerText = ((Number(p[5])/totalVotes)*100).toFixed(0) + "%";
            // Isi tarah baki options set honge
        }
    } catch(e) { console.log("No proposals found"); }
  }

  async function handleCreateProposal() {
    const title = document.getElementById('propTitle').value;
    const desc = document.getElementById('propDesc').value;
    if(!title || !desc) return alert("Fill all fields");
    
    try {
        const tx = await daoContract.createProposal(title, desc, ["A", "B", "C", "D"]);
        await tx.wait();
        alert("Proposal Created!");
        refreshData();
    } catch(e) { alert("Failed to create proposal"); }
  }

  async function castVote(option) {
    try {
        // Proposal ID 0 ke liye vote (A=0, B=1 etc based on your contract logic)
        const tx = await daoContract.castVote(0, option);
        await tx.wait();
        alert("Voted Successfully!");
        refreshData();
    } catch(e) { alert("Already voted or Error"); }
  }

  // --- REWARDS & STAKE FUNCTIONS (SAME AS PREVIOUS) ---
  async function loadRewards() {
    const tokens = await daoContract.getActiveRewardTokens();
    const container = document.getElementById('multiCoinList');
    container.innerHTML = "";
    for(let t of tokens) {
        const reward = await daoContract.getPendingReward(userAddress, t);
        const tContract = new ethers.Contract(t, ["function symbol() view returns (string)"], provider);
        const symbol = await tContract.symbol();
        container.innerHTML += `<div class="flex justify-between items-center bg-white/5 p-3 rounded-xl border border-white/10">
            <span class="text-sm font-bold">${symbol}</span>
            <span class="text-xs text-cyan-400">${parseFloat(ethers.formatEther(reward)).toFixed(4)}</span>
        </div>`;
    }
  }

  async function handleStake() {
    const amt = document.getElementById('stakeAmount').value;
    if(!amt) return;
    const wei = ethers.parseEther(amt);
    try {
        const allowance = await tokenContract.allowance(userAddress, DAO_ADDRESS);
        if(allowance < wei) {
            await (await tokenContract.approve(DAO_ADDRESS, ethers.MaxUint256)).wait();
        }
        await (await daoContract.addCoinsToDAO(wei)).wait();
        alert("Staked!"); refreshData();
    } catch(e) { alert("Stake Failed"); }
  }

  function updateTimer(seconds) {
    if(seconds <= 0) { document.getElementById('withdrawBtn').disabled = false; return; }
    document.getElementById('days').innerText = Math.floor(seconds/(3600*24)).toString().padStart(2,'0');
    document.getElementById('hours').innerText = Math.floor((seconds%(3600*24))/3600).toString().padStart(2,'0');
    document.getElementById('mins').innerText = Math.floor((seconds%3600)/60).toString().padStart(2,'0');
  }

  async function claimAllRewards() { await (await daoContract.claimAllRewards()).wait(); refreshData(); }
  async function withdrawPrincipal() { await (await daoContract.withdrawPrincipal()).wait(); refreshData(); }
  function setMax() { document.getElementById('stakeAmount').value = document.getElementById('userBalance').innerText; }
</script>
</body>
</html>
